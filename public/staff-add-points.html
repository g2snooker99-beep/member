<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <title>G2 Staff – เพิ่มแต้ม</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="./css/style.css"/>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-functions-compat.js"></script>
  <style>
    .pt-btn{padding:18px 0;border-radius:16px;border:none;background:rgba(45,224,128,0.14);
      color:#48f08d;font-size:22px;font-weight:900;cursor:pointer;transition:background .15s,transform .12s;}
    .pt-btn:active{transform:scale(0.92);} .pt-btn:hover{background:rgba(45,224,128,0.28);}
    .pt-btn:disabled{opacity:.4;pointer-events:none;}
    #memberCard{display:flex;gap:14px;align-items:center;background:rgba(255,255,255,0.07);
      border-radius:20px;padding:16px;margin:14px 0;}
    #memberCard .info p{margin:3px 0;font-size:13px;color:#9fe8c0;}
    #successMsg{margin-top:12px;padding:14px;border-radius:16px;background:rgba(45,224,128,0.15);
      color:#b9ffd4;font-weight:700;display:none;font-size:15px;}
  </style>
</head>
<body>
<div class="page"><div class="card">
  <h1 style="font-size:20px;text-align:center;">G2 SNOOKER</h1>
  <p class="sub" style="text-align:center;">Staff – เพิ่มแต้มสมาชิก</p>
  <div id="loading" style="text-align:center;padding:30px 0;">กำลังโหลด…</div>
  <div id="accessDenied" class="hidden" style="text-align:center;color:#ff7070;padding:20px;">⛔ คุณไม่มีสิทธิ์เข้าถึงหน้านี้</div>
  <div id="content" class="hidden">
    <div id="searchBox">
      <p style="color:#9fe8c0;font-size:14px;margin:0 0 8px;">สแกน QR ลูกค้าผ่าน LINE แล้วระบบจะค้นหาให้อัตโนมัติ หรือพิมพ์รหัสเองได้</p>
      <input id="tokenInput" placeholder="วางหรือพิมพ์รหัสที่นี่" style="margin-top:0;"/>
      <button onclick="lookupMember()">🔍 ค้นหาสมาชิก</button>
    </div>
    <div id="memberCard" class="hidden">
      <img id="mAvatar" class="avatar" style="width:54px;height:54px;flex-shrink:0;"/>
      <div class="info">
        <b id="mName">–</b>
        <p id="mMemberId">–</p>
        <p id="mCurrentPoints" style="color:#ffd166;font-weight:700;">แต้มเดือนนี้: –</p>
      </div>
    </div>
    <div id="pointButtons" class="hidden">
      <p style="color:#9fe8c0;font-size:14px;margin:4px 0 10px;">เลือกจำนวนแต้มที่จะเพิ่ม</p>
      <div class="point-buttons">
        <button class="pt-btn" onclick="addPoints(1)">+1</button>
        <button class="pt-btn" onclick="addPoints(2)">+2</button>
        <button class="pt-btn" onclick="addPoints(3)">+3</button>
        <button class="pt-btn" onclick="addPoints(5)">+5</button>
        <button class="pt-btn" onclick="addPoints(10)">+10</button>
        <button class="pt-btn" onclick="addPoints(15)">+15</button>
        <button class="pt-btn" onclick="addPoints(20)">+20</button>
        <button class="pt-btn" onclick="addPoints(30)">+30</button>
      </div>
      <div id="successMsg"></div>

    <div id="nextActions" class="hidden" style="margin-top:16px;">
      <button onclick="openLineScanner()" style="background:#00c300;color:#fff;">
        📷 ปิดหน้านี้เพื่อสแกนคนถัดไป
      </button>
      <button onclick="resetForm()" class="secondary" style="margin-top:8px;">
        ✍️ ป้อนรหัสเอง
      </button>
    </div>
      <button class="secondary" onclick="resetForm()" style="margin-top:12px;">🔄 เพิ่มให้สมาชิกคนอื่น</button>
    </div>
  </div>
</div></div>
<script src="./js/firebase-config.js"></script>
<script>
  window.addEventListener('error', function (e) {
    console.error('Uncaught error before init:', e.error || e.message);
    var loading = document.getElementById('loading');
    if (loading) loading.textContent = 'โหลดไม่สำเร็จ กรุณากดรีเฟรชหน้านี้ใหม่';
  });

  const STAFF_LIFF = "2010084269-Mv2yEosd";
  let sendPointNotification = null;
  try {
    const cloudFunctions = firebase.app().functions("asia-southeast1");
    sendPointNotification = cloudFunctions.httpsCallable("sendPointNotification");
  } catch (e) {
    console.error("Cloud Functions init failed:", e);
  }
  let staffProfile = null, memberDocId = null, memberData = null;

  function unlockStaff() {
    const saved = localStorage.getItem("g2_staff_unlocked");

    if (saved === "yes") {
      return true;
    }

    const pin = prompt("กรุณาใส่รหัสพนักงาน");

    if (pin === "2026") {
      localStorage.setItem("g2_staff_unlocked", "yes");
      return true;
    }

    alert("รหัสพนักงานไม่ถูกต้อง");
    return false;
  }

  async function init() {
    try {
      if (!unlockStaff()) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("accessDenied").classList.remove("hidden");
        return;
      }

      staffProfile = {
        userId: "staff-pin-2026",
        displayName: "G2 Staff"
      };

      document.getElementById("loading").style.display = "none";
      document.getElementById("content").classList.remove("hidden");

      const qrToken = new URLSearchParams(window.location.search).get("qrToken");

      if (qrToken) {
        document.getElementById("tokenInput").value = qrToken;
        await lookupMember();
      }
    } catch (error) {
      console.error("init error:", error);
      document.getElementById("loading").style.display = "none";
      alert("โหลดหน้าเพิ่มแต้มไม่สำเร็จ: " + error.message);
    }
  }

  function getCurrentMonthId() {
    const parts = new Intl.DateTimeFormat("en-CA", {
      timeZone: "Asia/Bangkok",
      year: "numeric",
      month: "2-digit"
    }).formatToParts(new Date());

    const year = parts.find(p => p.type === "year").value;
    const month = parts.find(p => p.type === "month").value;

    return `${year}-${month}`;
  }

  function getActiveMonthlyPoints(data) {
    const currentMonth = getCurrentMonthId();

    if (!data || data.pointsMonth !== currentMonth) {
      return 0;
    }

    return Number(data.monthlyPoints || 0);
  }

  async function lookupMember() {
    try {
      const token = document.getElementById("tokenInput").value.trim();

      if (!token) {
        alert("กรุณากรอกรหัส");
        return;
      }

      let snap = await db.collection("users").where("qrToken", "==", token).limit(1).get();

      if (snap.empty) {
        snap = await db.collection("users").where("memberId", "==", token).limit(1).get();
      }

      if (snap.empty) {
        alert("ไม่พบสมาชิก");
        return;
      }

      const doc = snap.docs[0];

      memberDocId = doc.id;
      memberData = doc.data();

      memberData.monthlyPoints = getActiveMonthlyPoints(memberData);
      memberData.pointsMonth = getCurrentMonthId();

      document.getElementById("mAvatar").src = memberData.pictureUrl || "";
      document.getElementById("mName").textContent = memberData.nickname || memberData.displayName || "-";
      document.getElementById("mMemberId").textContent = "รหัส: " + (memberData.memberId || "");
      document.getElementById("mCurrentPoints").textContent = "แต้มเดือนนี้: " + memberData.monthlyPoints;

      document.getElementById("memberCard").classList.remove("hidden");
      document.getElementById("pointButtons").classList.remove("hidden");
      document.getElementById("searchBox").classList.add("hidden");

      const nextActions = document.getElementById("nextActions");
      if (nextActions) nextActions.classList.add("hidden");

      const msg = document.getElementById("successMsg");
      if (msg) {
        msg.style.display = "none";
        msg.innerHTML = "";
      }
    } catch (error) {
      console.error("lookupMember error:", error);
      alert("ค้นหาสมาชิกไม่สำเร็จ: " + error.message);
    }
  }

  async function addPoints(amount) {
    if (!memberDocId) return;

    document.querySelectorAll(".pt-btn").forEach(b => b.disabled = true);

    try {
      const currentMonth = getCurrentMonthId();
      const currentPoints = getActiveMonthlyPoints(memberData);
      const newMonthlyPoints = currentPoints + amount;

      const batch = db.batch();

      batch.update(db.collection("users").doc(memberDocId), {
        monthlyPoints: newMonthlyPoints,
        pointsMonth: currentMonth,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      batch.set(db.collection("pointTransactions").doc(), {
        userId: memberDocId,
        memberId: memberData.memberId || "",
        staffId: staffProfile.userId,
        points: amount,
        type: "add",
        monthId: currentMonth,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      await batch.commit();

      memberData.monthlyPoints = newMonthlyPoints;
      memberData.pointsMonth = currentMonth;

      document.getElementById("mCurrentPoints").textContent = "แต้มเดือนนี้: " + newMonthlyPoints;

      const msg = document.getElementById("successMsg");
      msg.innerHTML = `
        ✅ เพิ่ม +${amount} แต้มสำเร็จ! รวม ${newMonthlyPoints} แต้ม
      `;
      msg.style.display = "block";

      const nextActions = document.getElementById("nextActions");
      if (nextActions) nextActions.classList.remove("hidden");

      if (sendPointNotification) {
        try {
          await sendPointNotification({
            userId: memberDocId,
            addedPoints: amount
          });
          console.log("LINE notification sent");
        } catch (notifyError) {
          console.error("LINE notification error:", notifyError);
        }
      } else {
        console.warn("sendPointNotification unavailable, skip notify");
      }
    } catch (error) {
      console.error("addPoints error:", error);
      alert("เกิดข้อผิดพลาด: " + error.message);
    } finally {
      document.querySelectorAll(".pt-btn").forEach(b => b.disabled = false);
    }
  }

  function openLineScanner() {
    try {
      if (typeof liff !== "undefined" && liff.closeWindow) {
        liff.closeWindow();
        return;
      }
    } catch (e) {}

    alert("กรุณากด X มุมขวาบน แล้วใช้ LINE สแกน QR ลูกค้าคนถัดไป");
  }

  function showNextActions() {
    const box = document.getElementById("nextActions");
    if (box) box.classList.remove("hidden");
  }

  function resetForm() {
    memberDocId = memberData = null;
    document.getElementById("tokenInput").value = "";
    document.getElementById("memberCard").classList.add("hidden");
    document.getElementById("pointButtons").classList.add("hidden");
    document.getElementById("searchBox").classList.remove("hidden");
    document.getElementById("successMsg").style.display = "none";
    history.replaceState({}, "", "./staff-add-points.html");
  }

  init().catch(e => { console.error(e); alert("เกิดข้อผิดพลาด"); });
</script>
</body>
</html>
