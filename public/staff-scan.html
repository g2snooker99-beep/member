<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>G2 Staff Scan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="./css/style.css" />

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <!-- STAFF PIN LOGIN -->
  <div id="pinPage" class="page">
    <div class="card center">
      <h1>G2 STAFF</h1>
      <p class="sub">กรอกรหัสพนักงาน</p>

      <input id="staffPin" type="password" placeholder="Staff PIN" inputmode="numeric" />

      <button onclick="loginStaff()">เข้าสู่ระบบ</button>

      <div class="notice">
        สำหรับพนักงาน G2 เท่านั้น
      </div>
    </div>
  </div>

  <!-- STAFF SCAN PAGE -->
  <div id="staffPage" class="page hidden">
    <div class="card center">
      <h1>G2 STAFF</h1>
      <p class="sub">สแกน QR ลูกค้าเพื่อเพิ่มแต้ม</p>

      <button id="scanBtn" onclick="scanMember()" disabled>
        กำลังโหลด LIFF...
      </button>

      <button class="secondary" onclick="location.href='./leaderboard.html'">
        ดู Leaderboard
      </button>

      <button class="secondary" onclick="logoutStaff()">
        ออกจากระบบ Staff
      </button>

      <div id="result" class="notice hidden"></div>
    </div>
  </div>

  <script>
    const STAFF_PIN = "1234";
    const STAFF_LIFF_ID = "2010084269-Mv2yEosd";

    function checkStaffSession() {
      const isStaff = localStorage.getItem("g2StaffLogin") === "yes";

      if (isStaff) {
        document.getElementById("pinPage").classList.add("hidden");
        document.getElementById("staffPage").classList.remove("hidden");
        initStaffLiff();
      } else {
        document.getElementById("pinPage").classList.remove("hidden");
        document.getElementById("staffPage").classList.add("hidden");
      }
    }

    function loginStaff() {
      const pin = document.getElementById("staffPin").value.trim();

      if (pin !== STAFF_PIN) {
        alert("รหัสพนักงานไม่ถูกต้อง");
        return;
      }

      localStorage.setItem("g2StaffLogin", "yes");
      checkStaffSession();
    }

    function logoutStaff() {
      localStorage.removeItem("g2StaffLogin");
      window.location.reload();
    }

    async function initStaffLiff() {
      try {
        await liff.init({ liffId: STAFF_LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        document.getElementById("scanBtn").disabled = false;
        document.getElementById("scanBtn").innerText = "สแกน QR ลูกค้า";

      } catch (error) {
        console.error("Staff LIFF Error:", error);
        alert("Staff LIFF Error: " + error.message);
      }
    }

    async function scanMember() {
      try {
        if (!liff.isApiAvailable("scanCodeV2")) {
          alert("เครื่องนี้ยังใช้สแกน QR ไม่ได้ กรุณาเปิดผ่าน Staff LIFF บนมือถือ");
          return;
        }

        const result = await liff.scanCodeV2();
        const raw = result.value;

        const qrData = JSON.parse(raw);

        if (qrData.type !== "G2_MEMBER") {
          alert("QR นี้ไม่ใช่ของสมาชิก G2");
          return;
        }

        localStorage.setItem("scanMemberData", JSON.stringify(qrData));
        window.location.href = "./staff-add-points.html";

      } catch (error) {
        console.error(error);
        alert("Scan Error: " + error.message);
      }
    }

    checkStaffSession();
  </script>
</body>
</html>
